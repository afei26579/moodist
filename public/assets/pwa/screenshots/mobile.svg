<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1280" viewBox="0 0 720 1280" role="img" aria-labelledby="title desc">
  <title id="title">Moodist Mobile Screenshot</title>
  <desc id="desc">Mobile preview showing sound list and mixer controls</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="100%" stop-color="#18181b" />
    </linearGradient>
  </defs>

  <rect width="720" height="1280" fill="url(#bg)" />
  <rect x="40" y="40" width="640" height="1200" rx="46" fill="#111113" stroke="#27272a" />

  <text x="90" y="130" fill="#fafafa" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="700">Moodist</text>
  <text x="90" y="180" fill="#a1a1aa" font-family="Inter, Arial, sans-serif" font-size="24">Your ambient mix</text>

  <rect x="90" y="240" width="540" height="120" rx="24" fill="#27272a" />
  <rect x="90" y="390" width="540" height="120" rx="24" fill="#27272a" />
  <rect x="90" y="540" width="540" height="120" rx="24" fill="#27272a" />
  <rect x="90" y="690" width="540" height="120" rx="24" fill="#27272a" />

  <circle cx="160" cy="300" r="30" fill="#22d3ee" />
  <circle cx="160" cy="450" r="30" fill="#34d399" />
  <circle cx="160" cy="600" r="30" fill="#a78bfa" />
  <circle cx="160" cy="750" r="30" fill="#f59e0b" />

  <rect x="220" y="287" width="360" height="24" rx="12" fill="#52525b" />
  <rect x="220" y="437" width="360" height="24" rx="12" fill="#52525b" />
  <rect x="220" y="587" width="360" height="24" rx="12" fill="#52525b" />
  <rect x="220" y="737" width="360" height="24" rx="12" fill="#52525b" />

  <rect x="90" y="980" width="540" height="160" rx="30" fill="#1f2937" />
  <circle cx="360" cy="1060" r="46" fill="#f4f4f5" />
</svg>
